<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini GTA RP 3D</title>
<style>
body { margin:0; overflow:hidden; background:#87ceeb; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.min.js"></script>

<script>
// Canvas e Three.js
const canvas = document.getElementById("game");
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb); // céu

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas});
renderer.setSize(window.innerWidth, window.innerHeight);

// Luz
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// Chão
const groundGeo = new THREE.PlaneGeometry(500,500);
const groundMat = new THREE.MeshPhongMaterial({color:0x2c2c2c});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// CARRO PNG (base64)
const carTexture = new THREE.TextureLoader().load(
  'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAA...'
);
const carMat = new THREE.MeshBasicMaterial({map: carTexture, transparent:true});
const carGeo = new THREE.BoxGeometry(2,1,4);
const car = new THREE.Mesh(carGeo, carMat);
car.position.y = 0.5;
scene.add(car);

// Controles
let keys = {};
document.addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

// Loop
function animate(){
    requestAnimationFrame(animate);

    let speed = keys["shift"] ? 0.3 : 0.15;
    if(keys["w"]) car.position.z -= speed;
    if(keys["s"]) car.position.z += speed;
    if(keys["a"]) car.position.x -= speed;
    if(keys["d"]) car.position.x += speed;

    // Câmera atrás do carro
    camera.position.x = car.position.x;
    camera.position.y = car.position.y + 5;
    camera.position.z = car.position.z + 10;
    camera.lookAt(car.position);

    renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener("resize", ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
