<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Casa de Apostas Falsa</title>
<style>
  body { 
    font-family: Arial, sans-serif; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    background: #222; 
    color: white; 
  }
  #betContainer {
    background: #333; 
    padding: 20px; 
    border-radius: 10px;
    text-align: center;
    width: 300px;
  }
  button {
    margin: 5px;
    padding: 10px 15px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    background: gold;
    font-weight: bold;
  }
  input[type=number] {
    width: 80px;
    padding: 5px;
    margin-top: 10px;
    text-align: center;
  }
</style>
</head>
<body>

<div id="betContainer">
  <h2>Casa de Apostas Falsa</h2>
  <p>Saldo: $<span id="balance">1000</span></p>
  <input type="number" id="betAmount" placeholder="Valor da aposta">
  <div>
    <button onclick="bet('win')">Apostar e Tentar Sorte</button>
    <button onclick="resetBet()">Resetar Saldo</button>
  </div>
  <p id="result"></p>
</div>

<script>
let balance = 1000;

function bet() {
  const amountInput = document.getElementById("betAmount");
  const amount = parseInt(amountInput.value);

  if(isNaN(amount) || amount <= 0) {
    alert("Digite um valor válido para apostar!");
    return;
  }
  if(amount > balance) {
    alert("Saldo insuficiente!");
    return;
  }

  // Simula resultado aleatório
  const win = Math.random() < 0.5; // 50% chance de ganhar
  if(win){
    balance += amount;
    document.getElementById("result").innerText = "Você ganhou $" + amount + "!";
  } else {
    balance -= amount;
    document.getElementById("result").innerText = "Você perdeu $" + amount + "!";
  }

  document.getElementById("balance").innerText = balance;
  amountInput.value = '';
}

function resetBet(){
  balance = 1000;
  document.getElementById("balance").innerText = balance;
  document.getElementById("result").innerText = '';
}
</script>

</body>
</html>
