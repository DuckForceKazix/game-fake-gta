<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini GTA 3D</title>
<style>
  body { margin:0; overflow:hidden; background:#111; }
  canvas { display:block; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.min.js"></script>

<script>
const canvas = document.getElementById("game");

// Scene, Camera, Renderer
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas});
renderer.setSize(window.innerWidth, window.innerHeight);

// Player
const playerGeo = new THREE.BoxGeometry(1,2,1);
const playerMat = new THREE.MeshBasicMaterial({color:0xffffff});
const player = new THREE.Mesh(playerGeo, playerMat);
player.position.y = 1;
scene.add(player);

// Chão
const groundGeo = new THREE.PlaneGeometry(100,100);
const groundMat = new THREE.MeshBasicMaterial({color:0x333333});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// Carro (apenas cubo)
const carGeo = new THREE.BoxGeometry(2,1,4);
const carMat = new THREE.MeshBasicMaterial({color:0xff0000});
const car = new THREE.Mesh(carGeo, carMat);
car.position.set(5,0.5,5);
scene.add(car);

// Controles
let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Loop
function animate() {
  requestAnimationFrame(animate);

  let speed = keys["shift"] ? 0.2 : 0.1;

  if(keys["w"]) player.position.z -= speed;
  if(keys["s"]) player.position.z += speed;
  if(keys["a"]) player.position.x -= speed;
  if(keys["d"]) player.position.x += speed;

  // Câmera atrás do player
  camera.position.x = player.position.x;
  camera.position.y = player.position.y + 5;
  camera.position.z = player.position.z + 10;
  camera.lookAt(player.position);

  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
