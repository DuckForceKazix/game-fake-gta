<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Motocross 3D</title>
<style>
  body { margin:0; overflow:hidden; background:#111; }
  canvas { display:block; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.min.js"></script>

<script>
const canvas = document.getElementById("game");

// Cena, câmera, renderizador
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb); // céu azul

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas});
renderer.setSize(window.innerWidth, window.innerHeight);

// Chão
const groundGeo = new THREE.PlaneGeometry(200,200,20,20);
const groundMat = new THREE.MeshBasicMaterial({color:0x228B22, wireframe:true});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// Rampas simples
const rampGeo = new THREE.BoxGeometry(5,2,10);
const rampMat = new THREE.MeshBasicMaterial({color:0x8B4513});
const ramp = new THREE.Mesh(rampGeo, rampMat);
ramp.position.set(0,1, -20);
ramp.rotation.x = -Math.PI/12;
scene.add(ramp);

// Moto (player)
const motoGeo = new THREE.BoxGeometry(1,1,2);
const motoMat = new THREE.MeshBasicMaterial({color:0xff0000});
const moto = new THREE.Mesh(motoGeo, motoMat);
moto.position.y = 0.5;
scene.add(moto);

// Física básica
let velocityY = 0;
const gravity = 0.01;

// Controles
let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Loop
function animate() {
  requestAnimationFrame(animate);

  // Movimento horizontal
  let speed = keys["shift"] ? 0.3 : 0.15;
  if(keys["w"]) moto.position.z -= speed;
  if(keys["s"]) moto.position.z += speed;
  if(keys["a"]) moto.position.x -= speed;
  if(keys["d"]) moto.position.x += speed;

  // Pular rampas
  if(keys[" "] && moto.position.y <= 0.51) velocityY = 0.2; // espaço pular

  // Gravidade
  moto.position.y += velocityY;
  velocityY -= gravity;
  if(moto.position.y < 0.5){
    moto.position.y = 0.5;
    velocityY = 0;
  }

  // Câmera atrás da moto
  camera.position.x = moto.position.x;
  camera.position.y = moto.position.y + 5;
  camera.position.z = moto.position.z + 8;
  camera.lookAt(moto.position);

  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
