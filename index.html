<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Casa de Apostas Tigrinho Fake</title>
<style>
  body { 
    font-family: Arial, sans-serif; 
    display:flex; 
    justify-content:center; 
    align-items:center; 
    height:100vh; 
    background: linear-gradient(to right,#ffcc00,#ff6600); 
    margin:0;
  }
  #tigrinho {
    background:#fff; 
    padding:20px; 
    border-radius:15px; 
    width:320px; 
    text-align:center; 
    box-shadow:0 0 20px rgba(0,0,0,0.5);
  }
  #tigrinho h2 { color:#ff6600; margin-bottom:10px; }
  #tigrinho p { font-size:18px; margin:5px 0; }
  input[type=number] { width:80px; padding:5px; margin:10px 0; text-align:center; }
  button { 
    padding:10px 15px; 
    margin:5px; 
    border:none; 
    border-radius:8px; 
    cursor:pointer; 
    font-weight:bold; 
    background:#ffcc00; 
    color:#333; 
    transition: 0.2s;
  }
  button:hover { background:#ff9900; color:white; }
  #result { margin-top:10px; font-weight:bold; font-size:16px; color:#ff3300; min-height:20px;}
</style>
</head>
<body>

<div id="tigrinho">
  <h2>🎰 Casa de Apostas Tigrinho 🎰</h2>
  <p>Saldo: $<span id="balance">1000</span></p>
  <input type="number" id="betAmount" placeholder="Valor da aposta">
  <div>
    <button onclick="playBet()">Apostar!</button>
    <button onclick="resetBalance()">Resetar Saldo</button>
  </div>
  <p id="result"></p>
</div>

<script>
let balance = 1000;

function playBet(){
  const betInput = document.getElementById("betAmount");
  const amount = parseInt(betInput.value);

  if(!amount || amount <= 0){
    alert("Digite um valor válido!");
    return;
  }
  if(amount > balance){
    alert("Saldo insuficiente!");
    return;
  }

  // Simula resultado estilo Tigrinho com "sorteio"
  const random = Math.random();
  let resultText = "";
  if(random < 0.45){
    balance -= amount;
    resultText = `😢 Você perdeu $${amount}!`;
  } else if(random < 0.9){
    balance += amount;
    resultText = `🎉 Você ganhou $${amount}!`;
  } else {
    const bonus = amount * 2;
    balance += bonus;
    resultText = `💎 Jackpot! Você ganhou $${bonus}!`;
  }

  document.getElementById("balance").innerText = balance;
  document.getElementById("result").innerText = resultText;
  betInput.value = '';
}

function resetBalance(){
  balance = 1000;
  document.getElementById("balance").innerText = balance;
  document.getElementById("result").innerText = '';
}
</script>

</body>
</html>
